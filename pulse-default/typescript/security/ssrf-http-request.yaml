id: pulse.typescript.security.ssrf-http-request
language: typescript
severity: error
message: |
  Server-Side Request Forgery (SSRF) via http/https request.
  Passing user-controlled URLs to http.request() or https.request() allows attackers to make
  the server send requests to internal services, cloud metadata endpoints, or other
  unintended destinations.
  Validate URLs against an allowlist of permitted hosts and schemes before making requests.
rule:
  any:
    - pattern: http.request($URL)
    - pattern: http.request($URL, $$$OPTS)
    - pattern: https.request($URL)
    - pattern: https.request($URL, $$$OPTS)
    - pattern: http.get($URL)
    - pattern: http.get($URL, $$$OPTS)
    - pattern: https.get($URL)
    - pattern: https.get($URL, $$$OPTS)
metadata:
  cwe: ["CWE-918"]
  owasp: ["A10:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      http.request(userUrl)
    - |
      https.request(req.query.url, callback)
    - |
      http.get(`http://${host}/data`)
  negative:
    - |
      https.request("https://api.example.com/data")
    - |
      http.get("http://localhost:3000/health", callback)
