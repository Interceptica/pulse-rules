id: pulse.typescript.security.permissions-world-writable
language: typescript
severity: error
message: |
  File permissions set to world-writable (0o777) via fs.chmod or fs.chmodSync.
  Setting world-writable permissions allows any user on the system to read, write, and execute
  the file, which can lead to unauthorized modification or data leakage.
  Use restrictive permissions such as 0o600 (owner read/write) or 0o644 (owner read/write, others read-only).
rule:
  any:
    - pattern: fs.chmod($PATH, 0o777, $$$CB)
    - pattern: fs.chmodSync($PATH, 0o777)
metadata:
  cwe: ["CWE-276"]
  owasp: ["A01:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      fs.chmod("/tmp/secret.txt", 0o777, (err) => {});
    - |
      fs.chmodSync("/tmp/secret.txt", 0o777);
  negative:
    - |
      fs.chmod("/tmp/secret.txt", 0o600, (err) => {});
    - |
      fs.chmodSync("/tmp/secret.txt", 0o644);
