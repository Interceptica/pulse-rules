id: pulse.java.security.xxe-saxparser
language: java
severity: error
message: |
  Potential XXE vulnerability via SAXParserFactory.
  The default configuration of SAXParserFactory allows external entity processing,
  which can lead to file disclosure, SSRF, and denial of service.
  Disable external entities: factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true).
rule:
  pattern: SAXParserFactory.newInstance()
metadata:
  cwe: ["CWE-611"]
  owasp: ["A05:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      SAXParserFactory factory = SAXParserFactory.newInstance();
      SAXParser parser = factory.newSAXParser();
      parser.parse(input, handler);
  negative:
    - |
      SAXParserFactory factory = SAXParserFactory.newInstance();
      factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
      SAXParser parser = factory.newSAXParser();
