id: pulse.java.security.auth-plaintext-password
language: java
severity: error
message: |
  Password stored or set without hashing.
  Calling setPassword() with a plaintext value stores the password without cryptographic
  hashing, making it recoverable if the database is compromised.
  Use BCryptPasswordEncoder or a similar password encoder: setPassword(encoder.encode(plaintext))
rule:
  pattern: $OBJ.setPassword($PLAIN)
  not:
    has:
      any:
        - pattern: $ENCODER.encode($$$)
        - pattern: BCrypt.hashpw($$$)
      stopBy: end
metadata:
  cwe: ["CWE-287"]
  owasp: ["A02:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      user.setPassword(rawPassword);
    - |
      account.setPassword(request.getParameter("password"));
  negative:
    - |
      user.setPassword(passwordEncoder.encode(rawPassword));
    - |
      user.setPassword(BCrypt.hashpw(rawPassword, BCrypt.gensalt()));
