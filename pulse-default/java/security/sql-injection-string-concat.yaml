id: pulse.java.security.sql-injection-string-concat
language: java
severity: error
message: |
  SQL injection via string concatenation in executeQuery() call.
  Concatenating user input into SQL queries allows arbitrary SQL execution.
  Use PreparedStatement with parameterized queries instead.
rule:
  pattern: $STMT.executeQuery($ARG)
  has:
    kind: binary_expression
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      stmt.executeQuery("SELECT * FROM users WHERE id = " + userId);
    - |
      stmt.executeQuery("SELECT name FROM " + table + " WHERE active = 1");
  negative:
    - |
      stmt.executeQuery("SELECT * FROM users");
    - |
      pstmt.executeQuery();
