id: pulse.java.security.sql-injection-jpa-native
language: java
severity: error
message: |
  SQL injection via string concatenation in JPA createNativeQuery() call.
  Concatenating user input into native SQL queries allows arbitrary SQL execution.
  Use parameterized native queries instead: em.createNativeQuery("SELECT ... WHERE id = ?1").
rule:
  pattern: $EM.createNativeQuery($ARG)
  has:
    kind: binary_expression
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      em.createNativeQuery("SELECT * FROM users WHERE id = " + userId);
    - |
      entityManager.createNativeQuery("SELECT " + cols + " FROM users");
  negative:
    - |
      em.createNativeQuery("SELECT * FROM users WHERE id = ?1");
    - |
      em.createNativeQuery("SELECT * FROM users");
