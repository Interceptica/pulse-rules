id: pulse.java.security.sql-injection-string-format
language: java
severity: error
message: |
  SQL injection via String.format() in executeQuery() call.
  Using String.format() to build SQL queries allows arbitrary SQL execution.
  Use PreparedStatement with parameterized queries instead.
rule:
  pattern: $STMT.executeQuery(String.format($FMT, $$$ARGS))
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      stmt.executeQuery(String.format("SELECT * FROM users WHERE id = %s", userId));
    - |
      stmt.executeQuery(String.format("SELECT %s FROM %s", column, table));
  negative:
    - |
      stmt.executeQuery("SELECT * FROM users");
    - |
      pstmt.executeQuery();
