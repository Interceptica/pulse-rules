id: pulse.java.security.jdbc-connection-string-credentials
language: java
severity: warning
message: |
  Credentials embedded in JDBC connection string.
  Including username and password in the JDBC URL exposes credentials in source code, logs, and version control.
  Use separate credential parameters or externalize credentials to configuration files and environment variables.
rule:
  any:
    - pattern: DriverManager.getConnection("$URL")
      has:
        kind: string_literal
        regex: "password="
        stopBy: end
    - pattern: DriverManager.getConnection("$URL")
      has:
        kind: string_literal
        regex: "user=.*&password="
        stopBy: end
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      DriverManager.getConnection("jdbc:mysql://localhost/db?user=root&password=secret");
  negative:
    - |
      DriverManager.getConnection("jdbc:mysql://localhost/db");
    - |
      DriverManager.getConnection(connectionUrl);
