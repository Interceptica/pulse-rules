id: pulse.java.security.xxe-documentbuilder
language: java
severity: error
message: |
  Potential XXE vulnerability via DocumentBuilderFactory.
  The default configuration of DocumentBuilderFactory allows external entity processing,
  which can lead to file disclosure, SSRF, and denial of service.
  Disable external entities: factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true).
rule:
  pattern: DocumentBuilderFactory.newInstance()
metadata:
  cwe: ["CWE-611"]
  owasp: ["A05:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();
      DocumentBuilder builder = factory.newDocumentBuilder();
      Document doc = builder.parse(input);
  negative:
    - |
      DocumentBuilderFactory factory = DocumentBuilderFactory.newInstance();
      factory.setFeature("http://apache.org/xml/features/disallow-doctype-decl", true);
      DocumentBuilder builder = factory.newDocumentBuilder();
