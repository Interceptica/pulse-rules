id: pulse.java.security.path-traversal-fileinputstream
language: java
severity: error
message: |
  Path traversal via FileInputStream with user-controlled input.
  An attacker can use path traversal sequences (../) to read arbitrary files from the server.
  Validate and canonicalize file paths before opening streams. Verify the path is within the expected directory.
rule:
  pattern: new FileInputStream($INPUT)
metadata:
  cwe: ["CWE-22"]
  owasp: ["A01:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      new FileInputStream(userInput);
    - |
      new FileInputStream(request.getParameter("file"));
  negative:
    - |
      new FileInputStream("/etc/app.conf");
