id: pulse.java.security.xxe-transformer
language: java
severity: error
message: |
  Potential XXE vulnerability via TransformerFactory.
  The default configuration of TransformerFactory allows external entity processing,
  which can lead to file disclosure, SSRF, and denial of service.
  Disable external access: factory.setAttribute(XMLConstants.ACCESS_EXTERNAL_DTD, "").
rule:
  pattern: TransformerFactory.newInstance()
metadata:
  cwe: ["CWE-611"]
  owasp: ["A05:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      TransformerFactory factory = TransformerFactory.newInstance();
      Transformer transformer = factory.newTransformer(source);
  negative:
    - |
      TransformerFactory factory = TransformerFactory.newInstance();
      factory.setAttribute(XMLConstants.ACCESS_EXTERNAL_DTD, "");
      factory.setAttribute(XMLConstants.ACCESS_EXTERNAL_STYLESHEET, "");
      Transformer transformer = factory.newTransformer(source);
