id: pulse.java.security.spring-insecure-cookie
language: java
severity: warning
message: |
  Cookie created without Secure or HttpOnly flags.
  Cookies without the Secure flag may be sent over unencrypted connections.
  Cookies without HttpOnly are accessible to JavaScript, enabling XSS-based session theft.
  Set cookie.setSecure(true) and cookie.setHttpOnly(true).
rule:
  any:
    - pattern: $COOKIE.setSecure(false)
    - pattern: $COOKIE.setHttpOnly(false)
    - pattern: new Cookie($NAME, $VALUE)
metadata:
  cwe: ["CWE-614"]
  owasp: ["A05:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: MEDIUM
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      Cookie cookie = new Cookie("session", sessionId);
    - |
      cookie.setSecure(false);
    - |
      cookie.setHttpOnly(false);
  negative:
    - |
      Cookie cookie = new Cookie("session", sessionId);
      cookie.setSecure(true);
      cookie.setHttpOnly(true);
