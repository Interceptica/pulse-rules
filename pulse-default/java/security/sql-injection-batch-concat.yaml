id: pulse.java.security.sql-injection-batch-concat
language: java
severity: error
message: |
  SQL injection via string concatenation in addBatch() call.
  Concatenating user input into SQL batch statements allows arbitrary SQL execution.
  Use PreparedStatement with parameterized queries and addBatch() without arguments instead.
rule:
  pattern: $STMT.addBatch($ARG)
  has:
    kind: binary_expression
    has:
      kind: string
      stopBy: end
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      stmt.addBatch("INSERT INTO users VALUES ('" + name + "')");
    - |
      statement.addBatch("UPDATE users SET name = '" + name + "' WHERE id = " + id);
  negative:
    - |
      pstmt.addBatch();
    - |
      stmt.addBatch("INSERT INTO logs VALUES ('system_event')");
