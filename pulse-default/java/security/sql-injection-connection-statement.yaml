id: pulse.java.security.sql-injection-connection-statement
language: java
severity: error
message: |
  SQL injection via string concatenation in executeUpdate() call.
  Concatenating user input into SQL queries allows arbitrary SQL execution.
  Use PreparedStatement with parameterized queries instead of Statement.
rule:
  pattern: $STMT.executeUpdate($ARG)
  has:
    kind: binary_expression
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      stmt.executeUpdate("UPDATE users SET role = '" + role + "' WHERE id = " + id);
    - |
      statement.executeUpdate("INSERT INTO logs VALUES ('" + msg + "')");
  negative:
    - |
      stmt.executeUpdate("DELETE FROM temp_table");
    - |
      pstmt.executeUpdate();
