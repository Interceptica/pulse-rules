id: pulse.java.security.auth-anonymous-access
language: java
severity: error
message: |
  Sensitive endpoint configured with anonymous() or permitAll() in Spring Security.
  Allowing anonymous or unauthenticated access to admin or internal API endpoints removes
  authentication requirements, exposing critical functions to unauthorized users.
  Restrict sensitive endpoints with hasRole(), hasAuthority(), or authenticated().
rule:
  any:
    - pattern: .antMatchers("/api/admin/**").anonymous()
    - pattern: .antMatchers("/api/admin/**").permitAll()
    - pattern: .requestMatchers("/api/admin/**").anonymous()
    - pattern: .requestMatchers("/api/admin/**").permitAll()
    - pattern: .antMatchers("/admin/**").anonymous()
    - pattern: .antMatchers("/admin/**").permitAll()
    - pattern: .requestMatchers("/admin/**").anonymous()
    - pattern: .requestMatchers("/admin/**").permitAll()
metadata:
  cwe: ["CWE-306"]
  owasp: ["A07:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      http.authorizeRequests().antMatchers("/api/admin/**").anonymous();
    - |
      http.authorizeRequests().antMatchers("/admin/**").permitAll();
    - |
      http.authorizeHttpRequests().requestMatchers("/api/admin/**").permitAll();
  negative:
    - |
      http.authorizeRequests().antMatchers("/api/admin/**").hasRole("ADMIN");
    - |
      http.authorizeRequests().antMatchers("/admin/**").authenticated();
