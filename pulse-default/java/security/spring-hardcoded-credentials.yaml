id: pulse.java.security.spring-hardcoded-credentials
language: java
severity: warning
message: |
  Hardcoded credentials detected in Spring Security configuration.
  Hardcoded passwords in source code can be discovered by anyone with access to the codebase.
  Use environment variables, secrets management systems, or encrypted configuration files.
rule:
  any:
    - pattern: .password("$PASS")
    - pattern: .withDefaultPasswordEncoder()
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      User.withUsername("admin").password("secret123").roles("ADMIN").build();
    - |
      User.withDefaultPasswordEncoder().username("admin").password("pass").build();
  negative:
    - |
      User.withUsername("admin").password(encodedPassword).roles("ADMIN").build();
