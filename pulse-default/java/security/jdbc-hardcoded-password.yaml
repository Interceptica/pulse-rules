id: pulse.java.security.jdbc-hardcoded-password
language: java
severity: warning
message: |
  Hardcoded password in JDBC DriverManager.getConnection() call.
  Hardcoded database passwords in source code can be discovered by anyone with access to the codebase.
  Use environment variables, secrets management systems, or encrypted configuration files.
rule:
  pattern: DriverManager.getConnection($URL, $USER, "$PASSWORD")
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      DriverManager.getConnection("jdbc:mysql://localhost/db", "root", "password123");
    - |
      DriverManager.getConnection(url, "admin", "s3cret");
  negative:
    - |
      DriverManager.getConnection(url, user, System.getenv("DB_PASSWORD"));
    - |
      DriverManager.getConnection(url, user, password);
