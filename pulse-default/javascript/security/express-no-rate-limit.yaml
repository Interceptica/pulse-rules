id: pulse.javascript.security.express-no-rate-limit
language: javascript
severity: warning
message: |
  Express application may lack rate limiting.
  Without rate limiting, the application is vulnerable to brute-force attacks, denial of service,
  and credential stuffing.
  Use express-rate-limit or a similar middleware: app.use(rateLimit({ windowMs: 15*60*1000, max: 100 }))
rule:
  pattern: express()
metadata:
  cwe: ["CWE-770"]
  owasp: ["A05:2021"]
  pulse.confidence: LOW
  pulse.impact: MEDIUM
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      const app = express()
  negative:
    - |
      const limit = rateLimit({ windowMs: 60000, max: 100 })
