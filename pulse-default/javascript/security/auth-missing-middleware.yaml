id: pulse.javascript.security.auth-missing-middleware
language: javascript
severity: warning
message: |
  Express route handler defined without authentication middleware.
  Routes that handle sensitive operations without an authentication middleware (e.g., passport.authenticate,
  requireAuth, isAuthenticated) may be accessible to unauthenticated users.
  Add authentication middleware before the route handler: app.get('/path', authMiddleware, handler)
rule:
  any:
    - pattern: $APP.get($PATH, $HANDLER)
    - pattern: $APP.post($PATH, $HANDLER)
    - pattern: $APP.put($PATH, $HANDLER)
    - pattern: $APP.delete($PATH, $HANDLER)
    - pattern: $APP.patch($PATH, $HANDLER)
metadata:
  cwe: ["CWE-862"]
  owasp: ["A01:2021"]
  pulse.confidence: LOW
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      app.get('/admin/users', (req, res) => { res.json(users) })
    - |
      app.post('/api/delete', deleteHandler)
    - |
      router.put('/settings', updateSettings)
  negative:
    - |
      app.get('/admin/users', authMiddleware, (req, res) => { res.json(users) })
    - |
      app.post('/api/delete', isAuthenticated, deleteHandler)
    - |
      app.get('/public/info', (req, res) => { res.json(info) })
