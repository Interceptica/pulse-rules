id: pulse.javascript.security.express-hardcoded-secret
language: javascript
severity: warning
message: |
  Hardcoded session secret in Express.
  Hardcoding the session secret in source code makes it easy for attackers to forge session cookies
  if the code is exposed. Hardcoded secrets also cannot be rotated without redeploying.
  Load the session secret from an environment variable: session({ secret: process.env.SESSION_SECRET })
rule:
  pattern: "session({ secret: $SECRET })"
  has:
    kind: string
    stopBy: end
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: HIGH
  pulse.impact: MEDIUM
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      app.use(session({ secret: "my-secret-key" }))
    - |
      app.use(session({ secret: "keyboard cat" }))
  negative:
    - |
      app.use(session({ secret: process.env.SESSION_SECRET }))
    - |
      app.use(session({ secret: config.secret }))
