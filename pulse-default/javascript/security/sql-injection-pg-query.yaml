id: pulse.javascript.security.sql-injection-pg-query
language: javascript
severity: error
message: |
  SQL injection via string concatenation in pg (node-postgres) query.
  User-controlled data concatenated into a SQL query string allows arbitrary SQL execution.
  Use parameterized queries instead: client.query("SELECT * FROM users WHERE id = $1", [userId])
rule:
  pattern: $CLIENT.query($QUERY)
  has:
    kind: binary_expression
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      client.query("SELECT * FROM users WHERE id = " + userId)
    - |
      pgClient.query("DELETE FROM users WHERE name = '" + name + "'")
  negative:
    - |
      client.query("SELECT * FROM users WHERE id = $1", [userId])
    - |
      client.query("SELECT * FROM users")
