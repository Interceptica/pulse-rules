id: pulse.javascript.security.sql-injection-template-literal
language: javascript
severity: error
message: |
  SQL injection via template literal in database query.
  User-controlled data interpolated into a template literal SQL query allows arbitrary SQL execution.
  Use parameterized queries instead: db.query("SELECT * FROM users WHERE id = $1", [userId])
rule:
  pattern: $DB.query($QUERY)
  has:
    kind: template_string
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      db.query(`SELECT * FROM users WHERE id = ${userId}`)
    - |
      pool.query(`INSERT INTO logs VALUES ('${msg}')`)
  negative:
    - |
      db.query("SELECT * FROM users WHERE id = $1", [userId])
    - |
      db.query("SELECT * FROM users")
