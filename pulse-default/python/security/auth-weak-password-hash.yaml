id: pulse.python.security.auth-weak-password-hash
language: python
severity: error
message: |
  Weak hash algorithm used for password hashing.
  Using MD5 or SHA1 to hash passwords is insecure because these algorithms are fast and
  vulnerable to brute-force and rainbow table attacks.
  Use a purpose-built password hashing algorithm such as bcrypt, argon2, or scrypt via
  the bcrypt, argon2-cffi, or passlib libraries.
rule:
  any:
    - pattern: hashlib.md5($$$ARGS)
    - pattern: hashlib.sha1($$$ARGS)
metadata:
  cwe: ["CWE-287"]
  owasp: ["A02:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      hashed = hashlib.md5(password.encode()).hexdigest()
    - |
      digest = hashlib.sha1(password.encode()).hexdigest()
    - |
      hashlib.md5(user_password)
  negative:
    - |
      hashed = bcrypt.hashpw(password.encode(), bcrypt.gensalt())
    - |
      hashlib.sha256(data.encode()).hexdigest()
