id: pulse.python.security.hardcoded-secret-key
language: python
severity: warning
message: |
  Hardcoded secret key detected.
  Storing secret keys in source code exposes them in version control history and to anyone
  with read access to the codebase. Compromised Django SECRET_KEY allows session forgery,
  CSRF bypass, and remote code execution via pickle-based sessions.
  Use environment variables: SECRET_KEY = os.environ["SECRET_KEY"].
rule:
  pattern: $VAR = $VAL
  constraints:
    VAR:
      regex: "(?i)^(SECRET_KEY|secret_key|DJANGO_SECRET_KEY)$"
    VAL:
      regex: "^[\"']."
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      SECRET_KEY = "django-insecure-abc123xyz"
    - |
      secret_key = "my-secret-key-value"
  negative:
    - |
      SECRET_KEY = os.environ["SECRET_KEY"]
    - |
      SECRET_KEY = config("SECRET_KEY")
