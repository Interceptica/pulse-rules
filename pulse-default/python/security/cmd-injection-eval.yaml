id: pulse.python.security.cmd-injection-eval
language: python
severity: error
message: |
  Code injection via eval().
  Passing user-controlled data to eval() allows arbitrary Python code execution.
  Avoid eval() entirely. Use ast.literal_eval() for safe evaluation of literal expressions,
  or restructure the code to avoid dynamic evaluation.
rule:
  any:
    - pattern: eval($ARG)
      has:
        kind: interpolation
        stopBy: end
    - pattern: eval($ARG)
      has:
        kind: binary_operator
        stopBy: end
    - pattern: eval($ARG)
      has:
        pattern: $STR.format($$$FMT_ARGS)
        stopBy: end
    - pattern: eval($ARG)
      not:
        has:
          kind: string
          stopBy: end
metadata:
  cwe: ["CWE-95"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      eval(user_input)
    - |
      eval(f"config['{key}']")
    - |
      eval("2 + " + user_expr)
    - |
      eval("{}({})".format(func, args))
  negative:
    - |
      eval("1 + 2")
    - |
      ast.literal_eval(user_input)
