id: pulse.python.security.sql-injection-format
language: python
severity: error
message: |
  SQL injection via str.format() in execute() call.
  Using .format() to build SQL queries allows arbitrary SQL execution.
  Use parameterized queries instead: cursor.execute("SELECT ... WHERE id = %s", (param,))
rule:
  pattern: $OBJ.execute($$$ARGS)
  has:
    pattern: $STR.format($$$FMT_ARGS)
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      cursor.execute("SELECT * FROM users WHERE id = {}".format(user_id))
    - |
      db.execute("INSERT INTO {} VALUES ({})".format(table, value))
    - |
      cursor.execute("DELETE FROM users WHERE name = '{}'".format(name))
  negative:
    - |
      cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
    - |
      cursor.execute("SELECT * FROM users")
    - |
      log.info("Query: {}".format(query))
