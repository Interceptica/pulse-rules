id: pulse.python.security.auth-no-password-validation
language: python
severity: warning
message: |
  Django set_password() called without prior password validation.
  Calling set_password() without first running validate_password() allows users to set
  weak or common passwords that do not meet the application's password policy.
  Call django.contrib.auth.password_validation.validate_password(password) before set_password().
rule:
  pattern: $USER.set_password($PASS)
metadata:
  cwe: ["CWE-287"]
  owasp: ["A02:2021"]
  pulse.confidence: LOW
  pulse.impact: MEDIUM
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      user.set_password(new_password)
    - |
      request.user.set_password(form.cleaned_data['password'])
  negative:
    - |
      validate_password(new_password)
      user.set_password(new_password)
