id: pulse.python.security.sql-injection-percent
language: python
severity: error
message: |
  SQL injection via %-formatting in execute() call.
  Using % operator to build SQL queries allows arbitrary SQL execution.
  Use parameterized queries instead: cursor.execute("SELECT ... WHERE id = %s", (param,))
rule:
  pattern: $OBJ.execute($$$ARGS)
  has:
    kind: binary_operator
    has:
      kind: string
      stopBy: end
    regex: "%"
    stopBy: end
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      cursor.execute("SELECT * FROM users WHERE id = %s" % user_id)
    - |
      db.execute("INSERT INTO %s VALUES (%s)" % (table, value))
    - |
      cursor.execute("DELETE FROM users WHERE name = '%s'" % name)
  negative:
    - |
      cursor.execute("SELECT * FROM users WHERE id = %s", (user_id,))
    - |
      cursor.execute("SELECT * FROM users")
    - |
      print("Query: %s" % query)
