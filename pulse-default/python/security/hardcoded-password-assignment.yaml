id: pulse.python.security.hardcoded-password-assignment
language: python
severity: warning
message: |
  Hardcoded password detected.
  Storing passwords directly in source code exposes credentials if the code is shared,
  committed to version control, or decompiled.
  Use environment variables (os.environ["PASSWORD"]) or a secrets manager instead.
rule:
  pattern: $VAR = $VAL
  constraints:
    VAR:
      regex: "(?i)(password|passwd|pwd)"
    VAL:
      regex: "^[\"']."
metadata:
  cwe: ["CWE-798"]
  owasp: ["A07:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: false
test:
  positive:
    - |
      password = "supersecret123"
    - |
      db_password = "hunter2"
    - |
      PASSWD = "admin"
  negative:
    - |
      password = os.environ["PASSWORD"]
    - |
      password = get_secret("password")
    - |
      password = ""
