id: pulse.go.security.input-validation-regex-dos
language: go
severity: error
message: |
  Potential Regular Expression Denial of Service (ReDoS) via user-controlled regex pattern.
  Passing user-supplied input to regexp.Compile() or regexp.MustCompile() allows an attacker
  to craft a malicious pattern. While Go's regexp engine uses a linear-time algorithm that
  mitigates catastrophic backtracking, user-controlled patterns can still cause resource
  exhaustion with very large or complex expressions.
  Validate regex patterns against a safelist, limit pattern length, or avoid using user input
  as regex patterns.
rule:
  any:
    - pattern: regexp.Compile($INPUT)
    - pattern: regexp.MustCompile($INPUT)
    - pattern: regexp.CompilePOSIX($INPUT)
    - pattern: regexp.MatchString($INPUT, $$$)
metadata:
  cwe: ["CWE-20"]
  owasp: ["A03:2021"]
  pulse.confidence: MEDIUM
  pulse.impact: MEDIUM
  pulse.fix_complexity: MEDIUM
  pulse.reachability_relevant: true
test:
  positive:
    - |
      re, err := regexp.Compile(userInput)
    - |
      regexp.MustCompile(r.URL.Query().Get("pattern"))
    - |
      matched := regexp.MatchString(dynamicPattern, data)
  negative:
    - |
      re := regexp.MustCompile(`^\d{3}-\d{4}$`)
    - |
      regexp.Compile("[a-zA-Z]+")
