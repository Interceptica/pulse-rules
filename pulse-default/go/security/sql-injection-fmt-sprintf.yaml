id: pulse.go.security.sql-injection-fmt-sprintf
language: go
severity: error
message: |
  SQL injection via fmt.Sprintf() in database query.
  User-controlled data formatted into a SQL query string via fmt.Sprintf allows arbitrary SQL execution.
  Use parameterized queries instead: db.Query("SELECT * FROM users WHERE id = $1", id)
rule:
  any:
    - pattern: $DB.Query(fmt.Sprintf($FMT, $$$ARGS))
    - pattern: $DB.QueryRow(fmt.Sprintf($FMT, $$$ARGS))
    - pattern: $DB.QueryContext($CTX, fmt.Sprintf($FMT, $$$ARGS))
    - pattern: $DB.QueryRowContext($CTX, fmt.Sprintf($FMT, $$$ARGS))
metadata:
  cwe: ["CWE-89"]
  owasp: ["A03:2021"]
  pulse.confidence: HIGH
  pulse.impact: HIGH
  pulse.fix_complexity: LOW
  pulse.reachability_relevant: true
test:
  positive:
    - |
      db.Query(fmt.Sprintf("SELECT * FROM users WHERE id = %s", userId))
    - |
      db.QueryRow(fmt.Sprintf("SELECT name FROM users WHERE email = '%s'", email))
  negative:
    - |
      db.Query("SELECT * FROM users WHERE id = $1", userId)
    - |
      db.QueryRow("SELECT name FROM users WHERE email = $1", email)
